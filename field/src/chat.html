<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailLink Field Station</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f8;
            --panel: #ffffff;
            --panel-strong: #f1f3f5;
            --text: #17191c;
            --muted: #5f6972;
            --faint: #89919a;
            --border: #d9dee3;
            --field: #ffffff;
            --rx: #ffffff;
            --tx: #e8f1f7;
            --accent: #255f85;
            --accent-strong: #184763;
            --good: #217346;
            --warn: #8a5a10;
            --bad: #b42318;
            --bad-soft: #fff1f0;
            --good-soft: #eff8f1;
            --focus: rgba(37, 95, 133, 0.18);
            --shadow: rgba(21, 30, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.4;
        }

        button,
        input {
            font: inherit;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            min-height: 100dvh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) auto auto;
            gap: 16px;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .brand {
            min-width: 0;
        }

        h1 {
            margin: 0;
            font-size: 1rem;
            font-weight: 720;
            letter-spacing: 0;
        }

        .subtitle {
            margin-top: 2px;
            color: var(--muted);
            font-size: 0.81rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .telemetry {
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 8px;
            align-items: center;
        }

        .metric {
            min-width: 86px;
            padding: 7px 10px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        .metric-label {
            display: block;
            color: var(--faint);
            font-size: 0.67rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .metric-value {
            display: block;
            max-width: 160px;
            color: var(--text);
            font-size: 0.83rem;
            font-weight: 650;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-label {
            min-width: 108px;
            justify-self: end;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 7px 10px;
            border: 0;
            border-left: 3px solid var(--good);
            background: #f0f8f3;
            color: var(--good);
            font-size: 0.78rem;
            font-weight: 760;
            text-transform: uppercase;
        }

        .status-label.transmitting {
            border-left-color: var(--bad);
            background: var(--bad-soft);
            color: var(--bad);
        }

        .status-label.reconnecting {
            border-left-color: var(--warn);
            background: #fff8e8;
            color: var(--warn);
        }

        body.sos-active {
            --bg: #fff7f6;
            --panel: #ffffff;
            --panel-strong: #fff1f0;
            --border: #f1b8b2;
            --accent: #9f2d20;
            --accent-strong: #7a2118;
            --tx: #fff1f0;
            --focus: rgba(159, 45, 32, 0.16);
        }

        .emergency-banner {
            display: none;
            padding: 10px 18px;
            border-bottom: 1px solid #dc6b62;
            background: #b42318;
            color: #ffffff;
            font-size: 0.84rem;
            font-weight: 780;
            text-align: center;
            text-transform: uppercase;
        }

        body.sos-active .emergency-banner {
            display: block;
        }

        .workspace {
            min-height: 0;
            width: min(1180px, 100%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            gap: 14px;
            padding: 16px;
        }

        .chat-panel,
        .side-panel {
            min-height: 0;
            border: 1px solid var(--border);
            background: var(--panel);
            box-shadow: 0 1px 2px var(--shadow);
        }

        .chat-panel {
            display: grid;
            grid-template-rows: minmax(0, 1fr);
            overflow: hidden;
        }

        #chat-log {
            min-height: 0;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .message {
            width: fit-content;
            max-width: min(74%, 720px);
            padding: 10px 12px;
            font-size: 0.94rem;
            line-height: 1.42;
            overflow-wrap: anywhere;
        }

        .message.received {
            align-self: flex-start;
            border: 1px solid var(--border);
            background: var(--rx);
        }

        .message.sent {
            align-self: flex-end;
            border: 1px solid #c7dbea;
            background: var(--tx);
        }

        .message.system {
            align-self: center;
            max-width: 86%;
            padding: 5px 9px;
            border: 1px solid var(--border);
            background: var(--panel-strong);
            color: var(--muted);
            font-size: 0.81rem;
            text-align: center;
        }

        .message img {
            display: block;
            width: min(360px, 100%);
            max-height: 420px;
            object-fit: contain;
            border: 1px solid var(--border);
            background: var(--field);
        }

        .side-panel {
            padding: 14px;
            display: grid;
            align-content: start;
            gap: 10px;
        }

        .panel-title {
            margin: 0;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 760;
            text-transform: uppercase;
        }

        .transfer-card {
            display: grid;
            gap: 9px;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        #location-status {
            min-height: 22px;
            padding: 8px 10px;
            border-left: 3px solid var(--bad);
            background: var(--bad-soft);
            color: var(--bad);
            font-size: 0.9rem;
            font-weight: 680;
            overflow-wrap: anywhere;
        }

        #location-status.location-ok {
            border-left-color: var(--good);
            background: var(--good-soft);
            color: var(--good);
        }

        .location-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .location-grid input {
            min-width: 0;
            height: 36px;
            border: 1px solid var(--border);
            padding: 0 9px;
            background: var(--field);
            color: var(--text);
            outline: none;
        }

        .location-grid input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus);
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn.danger {
            background: var(--bad);
            color: #ffffff;
        }

        .transfer-label {
            color: var(--faint);
            font-size: 0.77rem;
        }

        #image-status {
            min-height: 22px;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 650;
            overflow-wrap: anywhere;
        }

        .bar {
            height: 7px;
            overflow: hidden;
            background: #e5e9ed;
        }

        #image-progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 180ms ease;
        }

        .composer {
            display: grid;
            grid-template-columns: auto auto auto auto minmax(0, 1fr) auto auto;
            gap: 8px;
            align-items: center;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            background: var(--panel);
        }

        .toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 40px;
            padding: 0 10px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: var(--panel);
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
        }

        .toggle:has(input:checked) {
            border-color: #bdd3e3;
            color: var(--accent-strong);
            background: #f3f8fb;
        }

        .toggle input {
            width: 16px;
            height: 16px;
            margin: 0;
            accent-color: var(--accent);
        }

        #message-input {
            width: 100%;
            min-width: 0;
            height: 42px;
            border: 1px solid var(--border);
            padding: 0 13px;
            background: var(--field);
            color: var(--text);
            outline: none;
        }

        #message-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus);
        }

        .btn {
            height: 42px;
            border: 1px solid transparent;
            padding: 0 14px;
            background: var(--accent);
            color: #ffffff;
            font-weight: 850;
            cursor: pointer;
        }

        .btn.secondary {
            border-color: var(--border);
            background: var(--panel);
            color: var(--text);
        }

        .btn:hover {
            background: var(--accent-strong);
        }

        .btn.secondary:hover {
            border-color: #c4ccd4;
            background: var(--panel-strong);
        }

        .btn.danger:hover {
            background: #8f1f16;
        }

        .btn:focus-visible,
        .toggle:focus-within {
            outline: 0;
            box-shadow: 0 0 0 3px var(--focus);
        }

        .btn:disabled {
            cursor: wait;
            opacity: 0.58;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 860px) {
            .topbar {
                grid-template-columns: minmax(0, 1fr) auto;
            }

            .telemetry {
                grid-column: 1 / -1;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                order: 3;
            }

            .metric {
                min-width: 0;
            }

            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: auto minmax(0, 1fr);
            }

            .side-panel {
                order: -1;
                grid-template-columns: 1fr 1fr;
            }

            .side-panel > .panel-title {
                align-self: end;
            }

            .side-panel > .panel-title:first-of-type {
                grid-column: 1;
                grid-row: 1;
            }

            .side-panel > .transfer-card:first-of-type {
                grid-column: 1;
                grid-row: 2;
            }

            .side-panel > .panel-title:nth-of-type(2) {
                grid-column: 2;
                grid-row: 1;
            }

            .side-panel > .transfer-card:nth-of-type(2) {
                grid-column: 2;
                grid-row: 2;
            }
        }

        @media (max-width: 720px) {
            .composer {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            #message-input {
                grid-column: 1 / -1;
                order: -1;
            }

            .toggle,
            .btn {
                width: 100%;
                justify-content: center;
                padding: 0 10px;
            }

            #photo-btn,
            .btn[type="submit"],
            #sos-btn,
            #cancel-sos-btn {
                min-width: 0;
            }
        }

        @media (max-width: 620px) {
            .app {
                grid-template-rows: auto minmax(0, 1fr) auto;
            }

            .topbar {
                padding: 12px;
                gap: 10px;
            }

            .subtitle {
                white-space: normal;
            }

            .workspace {
                padding: 10px;
                gap: 8px;
            }

            .side-panel {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 8px;
                box-shadow: none;
            }

            .side-panel > .panel-title,
            .side-panel > .transfer-card,
            .side-panel > .panel-title:nth-of-type(2),
            .side-panel > .transfer-card:nth-of-type(2) {
                grid-column: auto;
                grid-row: auto;
            }

            .panel-title {
                font-size: 0.7rem;
            }

            .transfer-card {
                grid-template-columns: minmax(0, 1fr);
                gap: 7px;
                padding: 10px;
            }

            .transfer-label {
                display: none;
            }

            #image-status {
                min-height: 18px;
                font-size: 0.82rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .bar {
                height: 5px;
            }

            #chat-log {
                padding: 12px;
            }

            .message {
                max-width: 90%;
                font-size: 0.91rem;
            }

            #message-input {
                height: 44px;
            }

            .toggle {
                min-height: 36px;
                padding: 0 9px;
                font-size: 0.78rem;
            }

            .toggle input {
                width: 15px;
                height: 15px;
            }

            .btn {
                height: 40px;
                padding: 0 12px;
            }
        }

        @media (max-width: 420px) {
            .topbar {
                grid-template-columns: 1fr;
            }

            .status-label {
                justify-self: stretch;
                min-width: 0;
            }

            .telemetry {
                grid-template-columns: 1fr 1fr;
            }

            .metric:first-child {
                grid-column: 1 / -1;
            }

            .composer {
                grid-template-columns: 1fr 1fr;
            }

            .toggle {
                justify-content: center;
            }

            #photo-btn,
            .btn[type="submit"],
            #sos-btn,
            #cancel-sos-btn {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <h1>TrailLink Field Station</h1>
                <div class="subtitle">Simplex radio chat and image transfer</div>
            </div>
            <div class="telemetry" aria-label="Radio telemetry">
                <div class="metric">
                    <span class="metric-label">Device</span>
                    <span class="metric-value" id="telemetry-device">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">RMS</span>
                    <span class="metric-value" id="telemetry-rms">0.0000</span>
                </div>
                <div class="metric">
                    <span class="metric-label">VOX</span>
                    <span class="metric-value" id="telemetry-vox">Inactive</span>
                </div>
            </div>
            <div id="status-indicator" class="status-label">Online</div>
        </header>
        <div id="emergency-banner" class="emergency-banner">SOS transmitting until base acknowledgement</div>

        <main class="workspace">
            <section class="chat-panel" aria-label="Messages">
                <div id="chat-log">
                    <div class="message system">Connected. Waiting for traffic.</div>
                </div>
            </section>

            <aside class="side-panel" aria-label="Transfer status">
                <h2 class="panel-title">Image Transfer</h2>
                <div class="transfer-card">
                    <div class="transfer-label">Current transfer</div>
                    <div id="image-status">No image transfer active</div>
                    <div class="bar" aria-hidden="true">
                        <div id="image-progress"></div>
                    </div>
                </div>
                <h2 class="panel-title">Location</h2>
                <div class="transfer-card">
                    <div id="location-status" class="location-missing">No location set</div>
                    <div class="location-grid">
                        <input type="number" id="lat-input" placeholder="Latitude" step="0.000001">
                        <input type="number" id="lon-input" placeholder="Longitude" step="0.000001">
                    </div>
                    <div class="button-row">
                        <button type="button" id="gps-btn" class="btn secondary">GPS</button>
                        <button type="button" id="save-location-btn" class="btn secondary">Save</button>
                    </div>
                </div>
            </aside>
        </main>

        <form id="input-form" class="composer">
            <label class="toggle">
                <input type="checkbox" id="fec-checkbox" checked>
                FEC
            </label>
            <label class="toggle">
                <input type="checkbox" id="lowbw-checkbox" checked>
                Low-BW
            </label>
            <label class="toggle">
                <input type="checkbox" id="tx-location-checkbox">
                TX Location
            </label>
            <input type="file" id="image-input" accept="image/*" class="sr-only">
            <button type="button" id="photo-btn" class="btn secondary">Image</button>
            <input type="text" id="message-input" placeholder="Message to transmit" autocomplete="off" required>
            <button type="submit" class="btn">Transmit</button>
            <button type="button" id="sos-btn" class="btn danger">SOS</button>
            <button type="button" id="cancel-sos-btn" class="btn secondary" hidden>Cancel SOS</button>
        </form>
    </div>

    <script>
        const chatLog = document.getElementById('chat-log');
        const inputForm = document.getElementById('input-form');
        const messageInput = document.getElementById('message-input');
        const fecCheckbox = document.getElementById('fec-checkbox');
        const lowbwCheckbox = document.getElementById('lowbw-checkbox');
        const txLocationCheckbox = document.getElementById('tx-location-checkbox');
        const statusIndicator = document.getElementById('status-indicator');
        const photoBtn = document.getElementById('photo-btn');
        const imageInput = document.getElementById('image-input');
        const imageStatus = document.getElementById('image-status');
        const imageProgress = document.getElementById('image-progress');
        const locationStatus = document.getElementById('location-status');
        const latInput = document.getElementById('lat-input');
        const lonInput = document.getElementById('lon-input');
        const gpsBtn = document.getElementById('gps-btn');
        const saveLocationBtn = document.getElementById('save-location-btn');
        const sosBtn = document.getElementById('sos-btn');
        const cancelSosBtn = document.getElementById('cancel-sos-btn');

        const tDevice = document.getElementById('telemetry-device');
        const tRms = document.getElementById('telemetry-rms');
        const tVox = document.getElementById('telemetry-vox');

        const displayedMessages = new Set();
        const MAX_UPLOAD_BYTES = 32 * 1024;
        const LOW_BW_TARGET_BYTES = 4 * 1024;
        const STANDARD_TARGET_BYTES = 14 * 1024;
        let currentLocation = null;
        let activeSosId = null;

        function stripCallsign(text) {
            if (text.startsWith("VK2EMM/P: ")) return text.substring(10);
            if (text.startsWith("VK2EMM: ")) return text.substring(8);
            if (text.startsWith("VK2EMM/")) {
                const idx = text.indexOf(": ");
                if (idx !== -1 && text.substring(0, idx).startsWith("VK2EMM")) {
                    return text.substring(idx + 2);
                }
            }
            return text;
        }

        function setConnectionState(label, stateClass) {
            statusIndicator.textContent = label;
            statusIndicator.className = stateClass ? `status-label ${stateClass}` : 'status-label';
        }

        function setImageStatus(text, percent) {
            imageStatus.textContent = text || 'No image transfer active';
            imageProgress.style.width = `${Math.max(0, Math.min(100, percent || 0))}%`;
        }

        function formatLocation(location) {
            if (!location) return 'No location set';
            const acc = location.accuracy_m == null ? 'unknown' : `${Math.round(location.accuracy_m)} m`;
            return `${Number(location.lat).toFixed(6)}, ${Number(location.lon).toFixed(6)} (${acc})`;
        }

        function setLocationStatus(location) {
            currentLocation = location || null;
            locationStatus.textContent = formatLocation(currentLocation);
            locationStatus.classList.toggle('location-ok', Boolean(currentLocation));
            locationStatus.classList.toggle('location-missing', !currentLocation);
        }

        function setSosActive(active, id) {
            activeSosId = active ? id : null;
            document.body.classList.toggle('sos-active', active);
            sosBtn.hidden = active;
            cancelSosBtn.hidden = !active;
            photoBtn.disabled = active;
            messageInput.disabled = active;
            if (active) {
                setConnectionState('SOS TX', 'transmitting');
            } else if (statusIndicator.classList.contains('transmitting')) {
                setConnectionState('Online', '');
            }
        }

        function parseImageProgress(text) {
            const match = text.match(/(\d+)\s+(\d+)\/(\d+)\s+\((\d+)%\)/);
            if (!match) return null;
            return {
                id: match[1],
                count: match[2],
                total: match[3],
                percent: Number(match[4])
            };
        }

        function handleOperationalMessage(text) {
            if (text.startsWith('IMAGE_PROGRESS:')) {
                const progress = text.substring('IMAGE_PROGRESS:'.length);
                const parsed = parseImageProgress(progress);
                if (parsed) {
                    setImageStatus(`Receiving ${parsed.id}: ${parsed.count}/${parsed.total}`, parsed.percent);
                } else {
                    setImageStatus(progress, 0);
                }
                return true;
            }
            if (text.startsWith('IMAGE_COMPLETE:')) {
                setImageStatus('Image received', 100);
                appendMessage(`Image saved to ${text.substring('IMAGE_COMPLETE:'.length)}`, 'system');
                return true;
            }
            if (text.startsWith('IMAGE_ERROR:')) {
                setImageStatus('Image transfer error', 0);
                appendMessage(text.substring('IMAGE_ERROR:'.length), 'system');
                return true;
            }
            if (text.startsWith('SOS_ACTIVE:')) {
                const id = text.substring('SOS_ACTIVE:'.length);
                setSosActive(true, id);
                appendMessage(`SOS ${id} active`, 'system');
                return true;
            }
            if (text.startsWith('SOS_ACK:')) {
                const id = text.substring('SOS_ACK:'.length);
                setSosActive(false, null);
                appendMessage(`SOS ${id} acknowledged by base`, 'system');
                return true;
            }
            if (text.startsWith('SOS_CANCELLED:')) {
                const id = text.substring('SOS_CANCELLED:'.length);
                setSosActive(false, null);
                appendMessage(`SOS ${id} cancelled locally`, 'system');
                return true;
            }
            if (/^System: Image Chunk \d+\/\d+ Received$/.test(text)) {
                const progressText = text.replace('System: Image Chunk ', '').replace(' Received', '');
                const parts = progressText.split('/');
                const count = Number(parts[0]);
                const total = Number(parts[1]);
                const percent = total > 0 ? Math.round((count / total) * 100) : 0;
                setImageStatus(`Receiving image: ${progressText}`, percent);
                return true;
            }
            return false;
        }

        function appendMessage(text, type) {
            if (handleOperationalMessage(text)) return;

            const cleanText = (type === 'received' || type === 'sent') ? stripCallsign(text) : text;
            const key = `${type}:${cleanText}`;
            if (displayedMessages.has(key)) return;
            displayedMessages.add(key);

            let actualType = type;
            let imageSource = '';

            if (type === 'sent_image') {
                actualType = 'sent';
                imageSource = text;
            } else if (cleanText.startsWith('IMAGE:')) {
                actualType = type === 'received' ? 'received' : actualType;
                imageSource = cleanText.substring(6);
                setImageStatus('Image received', 100);
            }

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', actualType);

            if (imageSource) {
                const img = document.createElement('img');
                img.src = imageSource;
                img.alt = type === 'sent_image' ? 'Transmitted image' : 'Received image';
                msgDiv.appendChild(img);
            } else {
                msgDiv.textContent = cleanText;
            }

            chatLog.appendChild(msgDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        const eventSource = new EventSource('/events');

        eventSource.onopen = () => {
            setConnectionState('Online', '');
        };

        eventSource.onmessage = (event) => {
            if (event.data === "system_overrun") {
                appendMessage("Event buffer overrun occurred.", "system");
                return;
            }
            appendMessage(event.data, 'received');
        };

        eventSource.onerror = () => {
            setConnectionState('Reconnect', 'reconnecting');
        };

        let initialLoad = true;
        async function updateStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();

                tDevice.textContent = data.device || '--';
                tRms.textContent = Number(data.current_rms || 0).toFixed(4);
                tVox.textContent = data.vox_active ? "Active" : "Inactive";

                if (data.is_transmitting) {
                    setConnectionState('Transmit', 'transmitting');
                } else if (statusIndicator.classList.contains('transmitting')) {
                    setConnectionState('Online', '');
                }

                if (data.image_status) {
                    const parsed = parseImageProgress(data.image_status);
                    if (parsed) {
                        setImageStatus(`Receiving ${parsed.id}: ${parsed.count}/${parsed.total}`, parsed.percent);
                    } else {
                        setImageStatus(data.image_status, data.image_status.includes('complete') ? 100 : 0);
                    }
                }

                if (data.location) {
                    latInput.value = Number(data.location.lat).toFixed(6);
                    lonInput.value = Number(data.location.lon).toFixed(6);
                    setLocationStatus(data.location);
                } else {
                    setLocationStatus(null);
                }

                if (data.sos && data.sos.active) {
                    setSosActive(true, data.sos.id);
                } else if (!data.is_transmitting && activeSosId) {
                    setSosActive(false, null);
                }

                if (initialLoad && data.rx_messages) {
                    data.rx_messages.forEach(msg => appendMessage(msg, 'received'));
                    initialLoad = false;
                }
            } catch {
                if (!statusIndicator.classList.contains('transmitting')) {
                    setConnectionState('Offline', 'reconnecting');
                }
            }
        }

        updateStatus();
        setInterval(updateStatus, 2000);

        inputForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;
            if (activeSosId) return;

            const useFec = fecCheckbox.checked;
            appendMessage(message, 'sent');
            messageInput.value = '';

            try {
                const res = await fetch('/transmit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        use_fec: useFec,
                        tx_location: txLocationCheckbox.checked
                    })
                });

                if (!res.ok) appendMessage("Failed to schedule transmission.", "system");
            } catch {
                appendMessage("Failed to connect to server.", "system");
            }
        });

        async function saveLocation(location) {
            try {
                const res = await fetch('/location', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location })
                });
                if (!res.ok) {
                    const body = await res.json().catch(() => ({}));
                    appendMessage(body.message || 'Failed to save location.', 'system');
                    return false;
                }
                setLocationStatus(location);
                return true;
            } catch {
                appendMessage('Failed to connect to server.', 'system');
                return false;
            }
        }

        saveLocationBtn.addEventListener('click', async () => {
            const lat = Number(latInput.value);
            const lon = Number(lonInput.value);
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
                appendMessage('Enter valid latitude and longitude.', 'system');
                return;
            }
            await saveLocation({ lat, lon, accuracy_m: null });
        });

        gpsBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                appendMessage('Browser geolocation is unavailable.', 'system');
                return;
            }
            gpsBtn.disabled = true;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                gpsBtn.disabled = false;
                const location = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy_m: pos.coords.accuracy
                };
                latInput.value = location.lat.toFixed(6);
                lonInput.value = location.lon.toFixed(6);
                await saveLocation(location);
            }, () => {
                gpsBtn.disabled = false;
                appendMessage('Could not get browser location.', 'system');
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
        });

        sosBtn.addEventListener('click', async () => {
            if (activeSosId) return;
            const message = messageInput.value.trim();
            const confirmed = window.confirm('Start SOS repeat transmissions until base acknowledges receipt?');
            if (!confirmed) return;

            try {
                const res = await fetch('/sos/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, use_fec: fecCheckbox.checked })
                });
                if (!res.ok) {
                    const body = await res.json().catch(() => ({}));
                    appendMessage(body.message || 'Failed to start SOS.', 'system');
                }
            } catch {
                appendMessage('Failed to connect to server.', 'system');
            }
        });

        cancelSosBtn.addEventListener('click', async () => {
            try {
                await fetch('/sos/cancel', { method: 'POST' });
            } catch {
                appendMessage('Failed to connect to server.', 'system');
            }
        });

        photoBtn.addEventListener('click', () => {
            imageInput.click();
        });

        function dataUrlByteLength(dataUrl) {
            const comma = dataUrl.indexOf(',');
            const base64Length = comma === -1 ? dataUrl.length : dataUrl.length - comma - 1;
            return Math.floor((base64Length * 3) / 4);
        }

        function drawCompressedImage(img, isLowBw, maxSize, quality, mimeType) {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > height && width > maxSize) {
                height = Math.round((height * maxSize) / width);
                width = maxSize;
            } else if (height >= width && height > maxSize) {
                width = Math.round((width * maxSize) / height);
                height = maxSize;
            }

            canvas.width = Math.max(1, width);
            canvas.height = Math.max(1, height);

            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            if (isLowBw) ctx.filter = 'grayscale(1)';
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const encoded = canvas.toDataURL(mimeType, quality);
            if (mimeType === 'image/webp' && !encoded.startsWith('data:image/webp')) {
                return null;
            }
            return encoded;
        }

        function compressImage(img) {
            const isLowBw = lowbwCheckbox.checked;
            const targetBytes = isLowBw ? LOW_BW_TARGET_BYTES : STANDARD_TARGET_BYTES;
            const sizes = isLowBw ? [128, 112, 96, 80, 64, 56] : [220, 180, 144, 128, 112, 96];
            const qualities = isLowBw ? [0.28, 0.22, 0.16, 0.11, 0.08] : [0.52, 0.42, 0.32, 0.24, 0.18];
            const formats = ['image/webp', 'image/jpeg'];

            let best = null;
            let bestBytes = Number.POSITIVE_INFINITY;
            for (const mimeType of formats) {
                for (const size of sizes) {
                    for (const quality of qualities) {
                        const candidate = drawCompressedImage(img, isLowBw, size, quality, mimeType);
                        if (!candidate) continue;
                        const bytes = dataUrlByteLength(candidate);
                        if (bytes < bestBytes) {
                            best = candidate;
                            bestBytes = bytes;
                        }
                        if (bytes <= targetBytes) return candidate;
                    }
                }
            }
            return best;
        }

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            imageInput.value = '';
            if (!file || activeSosId) return;

            photoBtn.disabled = true;
            setImageStatus('Preparing image', 8);

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = async function() {
                    const compressedBase64 = compressImage(img);
                    if (!compressedBase64) {
                        photoBtn.disabled = false;
                        setImageStatus('Image compression failed', 0);
                        appendMessage("Image compression failed.", "system");
                        return;
                    }
                    const byteLength = dataUrlByteLength(compressedBase64);
                    const chunkCount = Math.ceil(byteLength / 250);

                    if (byteLength > MAX_UPLOAD_BYTES) {
                        photoBtn.disabled = false;
                        setImageStatus('Image is too large after compression', 0);
                        appendMessage("Image is too large to transmit.", "system");
                        return;
                    }

                    appendMessage(compressedBase64, 'sent_image');
                    setImageStatus(`Queued ${Math.ceil(byteLength / 1024)} KB image (${chunkCount} chunks)`, 12);

                    try {
                        const res = await fetch('/transmit_image', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                image: compressedBase64,
                                use_fec: fecCheckbox.checked
                            })
                        });

                        if (!res.ok) {
                            const body = await res.json().catch(() => ({}));
                            appendMessage(body.message || "Failed to schedule image transmission.", "system");
                            setImageStatus('Image schedule failed', 0);
                        } else {
                            setImageStatus(`Transmitting ${Math.ceil(byteLength / 1024)} KB image (${chunkCount} chunks)`, 30);
                        }
                    } catch {
                        appendMessage("Failed to connect to server.", "system");
                        setImageStatus('Image schedule failed', 0);
                    } finally {
                        photoBtn.disabled = false;
                    }
                };
                img.onerror = function() {
                    photoBtn.disabled = false;
                    setImageStatus('Could not read image', 0);
                    appendMessage("Could not read image file.", "system");
                };
                img.src = event.target.result;
            };
            reader.onerror = function() {
                photoBtn.disabled = false;
                setImageStatus('Could not read image', 0);
                appendMessage("Could not read image file.", "system");
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
