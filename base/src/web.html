<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrailLink Base</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --panel: #050505;
      --field: #0b0b0b;
      --line: #3a3a3a;
      --line-strong: #f2f2f2;
      --muted: #9a9a9a;
      --text: #f7f7f7;
      --dim: #646464;
      --bad: #fff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.42 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    button,
    input {
      font: inherit;
    }

    button {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 0 9px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      text-transform: uppercase;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--line-strong);
      outline: 0;
    }

    button[aria-pressed="true"],
    button.primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    input {
      height: 32px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 0 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--line-strong);
    }

    main {
      width: min(1500px, 100%);
      height: 100dvh;
      max-height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 7px 13px;
      align-items: center;
      align-content: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line-strong);
      background: var(--bg);
    }

    .brand {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0;
      margin-right: auto;
      white-space: nowrap;
    }

    .readout {
      min-width: 0;
      color: var(--muted);
      white-space: nowrap;
    }

    .readout strong {
      color: var(--text);
      font-weight: 800;
    }

    .state {
      padding-bottom: 1px;
      border-bottom: 1px solid transparent;
    }

    .state.tx {
      border-bottom-color: var(--text);
    }

    .state.rx {
      outline: 1px solid var(--line);
      outline-offset: 2px;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(360px, 0.88fr) minmax(540px, 1.42fr);
      border-bottom: 1px solid var(--line);
    }

    .left,
    .right {
      min-width: 0;
      min-height: 0;
      display: grid;
    }

    .left {
      grid-template-rows: auto minmax(0, 1fr);
      border-right: 1px solid var(--line);
    }

    .right {
      grid-template-rows: minmax(0, 0.9fr) minmax(0, 0.9fr) minmax(0, 1.2fr);
    }

    section {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: var(--panel);
    }

    section + section {
      border-top: 1px solid var(--line);
    }

    .section-head {
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 5px 8px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      font-weight: 800;
      text-transform: uppercase;
    }

    .section-head small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: none;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .log {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      background: var(--bg);
    }

    .msg {
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }

    .msg.rx::before { content: "RX "; color: var(--muted); }
    .msg.tx::before { content: "TX "; color: var(--muted); }
    .msg.system { color: var(--muted); }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 8px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    .link-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--line);
    }

    .link-row {
      display: contents;
    }

    .link-cell {
      min-height: 32px;
      padding: 6px 8px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .link-cell label {
      color: var(--muted);
      margin-right: 6px;
      text-transform: uppercase;
    }

    .link-cell strong {
      color: var(--text);
      font-weight: 800;
    }

    .chat-section {
      min-height: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      background: var(--panel);
    }

    .actions button {
      width: 100%;
      min-width: 0;
    }

    canvas,
    #map {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: block;
      background: var(--bg);
    }

    .map-wrap,
    .canvas-wrap {
      min-height: 0;
      position: relative;
    }

    .map-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .notice {
      position: absolute;
      left: 10px;
      bottom: 10px;
      z-index: 500;
      max-width: calc(100% - 20px);
      padding: 6px 8px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.86);
      color: var(--muted);
      pointer-events: none;
    }

    .notice:empty {
      display: none;
    }

    .sos {
      color: var(--text);
      font-weight: 900;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .leaflet-container {
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }

    .leaflet-tile {
      filter: grayscale(1) contrast(1.08);
    }

    .leaflet-bar a,
    .leaflet-control-attribution {
      background: var(--bg) !important;
      color: var(--text) !important;
      border-color: var(--line) !important;
    }

    .leaflet-control-attribution a {
      color: var(--text) !important;
    }

    .map-marker {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border: 2px solid var(--text);
      background: var(--bg);
      color: var(--text);
      font-weight: 900;
      box-shadow: 0 0 0 2px var(--bg);
    }

    @media (max-width: 1120px) {
      .topbar {
        gap: 6px 10px;
      }

      .workspace {
        grid-template-columns: minmax(280px, 0.95fr) minmax(340px, 1.05fr);
      }

      .left {
        border-right: 1px solid var(--line);
        border-bottom: 0;
      }

      .right {
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1.15fr);
      }
    }

    @media (max-width: 760px) {
      body {
        font-size: 12px;
      }

      .topbar {
        gap: 5px 9px;
        padding: 6px 8px;
      }

      .brand {
        width: 100%;
      }

      form {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 0.96fr) minmax(0, 1.04fr);
      }

      .left {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .link-strip {
        grid-template-columns: 1fr;
      }

      .right {
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">TRAILLINK BASE</div>
      <div class="readout">state <strong id="state" class="state idle">IDLE</strong></div>
      <div class="readout">freq <strong id="freq">--</strong></div>
      <div class="readout">mode <button id="modeToggle" type="button" aria-pressed="false">Manual</button></div>
      <div class="readout">audio <strong id="audio">--</strong></div>
      <div class="readout">snr <strong id="topSnr">--</strong></div>
      <div class="readout">rssi <strong id="topRssi">--</strong></div>
      <div class="readout">loss <strong id="topLoss">--</strong></div>
      <div class="readout">crc <strong id="topCrc">--</strong></div>
      <div class="readout">sync <strong id="topSync">--</strong></div>
      <div class="readout">rtt <strong id="topRtt">--</strong></div>
      <div class="readout">updated <strong id="updated">--</strong></div>
    </header>

    <div class="workspace">
      <div class="left">
        <section aria-label="Link details">
          <div class="section-head">
            <span>LINK</span>
            <small id="imageStatus"></small>
          </div>
          <div class="link-strip">
            <div class="link-row">
              <div class="link-cell"><label>SNR</label><strong id="snr">--</strong></div>
              <div class="link-cell"><label>RSSI</label><strong id="rssi">--</strong></div>
              <div class="link-cell"><label>LOSS</label><strong id="loss">--</strong></div>
            </div>
            <div class="link-row">
              <div class="link-cell"><label>CRC</label><strong id="crc">--</strong></div>
              <div class="link-cell"><label>SYNC</label><strong id="sync">--</strong></div>
              <div class="link-cell"><label>ROUND TRIP</label><strong id="rtt">--</strong></div>
            </div>
            <div class="link-row">
              <div class="link-cell"><label>FEC</label><strong id="fec">--</strong></div>
              <div class="link-cell"><label>FIELD</label><strong id="fieldCoords">--</strong></div>
              <div class="link-cell"><label>BASE</label><strong id="baseCoords">--</strong></div>
            </div>
          </div>
          <div class="actions">
            <button id="ackSos" type="button">RE-ACK SOS</button>
            <button id="clearSos" type="button">CLEAR SOS</button>
            <button id="clearLocation" type="button">CLEAR FIELD LOC</button>
          </div>
        </section>

        <section class="chat-section" aria-label="Communications">
          <div class="section-head">
            <span>COMMS</span>
            <small id="sos" class="sos"></small>
          </div>
          <div id="log" class="log"></div>
          <form id="txForm">
            <input id="txInput" maxlength="220" autocomplete="off" placeholder="type message">
            <button class="primary" type="submit">Send</button>
          </form>
        </section>
      </div>

      <div class="right">
        <section aria-label="FFT spectrum">
          <div class="section-head"><span>FFT</span><small>0-5 kHz</small></div>
          <div class="canvas-wrap"><canvas id="fft"></canvas></div>
        </section>

        <section aria-label="Waterfall">
          <div class="section-head"><span>WATERFALL</span><small>0-5 kHz, fast scroll</small></div>
          <div class="canvas-wrap"><canvas id="waterfall"></canvas></div>
        </section>

        <section aria-label="Map">
          <div class="section-head">
            <span>MAP</span>
            <div class="map-tools">
              <small id="mapLabel">waiting</small>
              <button id="baseGps" type="button">GPS</button>
            </div>
          </div>
          <div class="map-wrap">
            <div id="map"></div>
            <div id="mapNotice" class="notice"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const els = {
      state: document.getElementById('state'),
      freq: document.getElementById('freq'),
      modeToggle: document.getElementById('modeToggle'),
      audio: document.getElementById('audio'),
      topSnr: document.getElementById('topSnr'),
      topRssi: document.getElementById('topRssi'),
      topLoss: document.getElementById('topLoss'),
      topCrc: document.getElementById('topCrc'),
      topSync: document.getElementById('topSync'),
      topRtt: document.getElementById('topRtt'),
      updated: document.getElementById('updated'),
      log: document.getElementById('log'),
      sos: document.getElementById('sos'),
      imageStatus: document.getElementById('imageStatus'),
      snr: document.getElementById('snr'),
      rssi: document.getElementById('rssi'),
      loss: document.getElementById('loss'),
      crc: document.getElementById('crc'),
      sync: document.getElementById('sync'),
      rtt: document.getElementById('rtt'),
      fec: document.getElementById('fec'),
      fieldCoords: document.getElementById('fieldCoords'),
      baseCoords: document.getElementById('baseCoords'),
      mapLabel: document.getElementById('mapLabel'),
      mapNotice: document.getElementById('mapNotice'),
      fft: document.getElementById('fft'),
      waterfall: document.getElementById('waterfall'),
      baseGps: document.getElementById('baseGps')
    };

    let lastLogKey = '';
    let currentMode = 'Manual';
    let map = null;
    let baseMarker = null;
    let fieldMarker = null;
    let fieldAccuracy = null;
    let linkLine = null;
    let lastMapKey = '';
    let waterfallRows = [];
    let latestWaterfallRow = [];
    let waterfallRowLength = 0;
    let pendingSnapshot = null;
    let renderQueued = false;
    const STATUS_POLL_MS = 120;
    const WATERFALL_INTERVAL_MS = 33;
    const WATERFALL_ROW_PX = 1;
    const WATERFALL_ROWS_PER_TICK = 3;

    document.getElementById('txForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const input = document.getElementById('txInput');
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      await postJson('/transmit', { message });
    });

    document.getElementById('ackSos').addEventListener('click', () => postJson('/sos/ack', {}));
    document.getElementById('clearSos').addEventListener('click', () => postJson('/sos/clear', {}));
    document.getElementById('clearLocation').addEventListener('click', () => postJson('/location/clear', {}));
    els.modeToggle.addEventListener('click', async () => {
      const next = currentMode.toLowerCase() === 'claude' ? 'manual' : 'claude';
      els.modeToggle.disabled = true;
      await postJson('/mode', { mode: next });
      els.modeToggle.disabled = false;
    });
    els.baseGps.addEventListener('click', setBaseFromBrowserGps);

    async function postJson(url, body) {
      try {
        await fetch(url, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
      } catch {
      }
    }

    async function poll() {
      try {
        const response = await fetch('/status', { cache: 'no-store' });
        if (!response.ok) throw new Error(response.statusText);
        const snapshot = await response.json();
        scheduleRender(snapshot);
      } catch (error) {
        els.updated.textContent = 'offline';
      } finally {
        setTimeout(poll, STATUS_POLL_MS);
      }
    }

    function scheduleRender(snapshot) {
      pendingSnapshot = snapshot;
      if (renderQueued) return;
      renderQueued = true;
      requestAnimationFrame(() => {
        renderQueued = false;
        if (pendingSnapshot) render(pendingSnapshot);
      });
    }

    function render(snapshot) {
      const state = snapshot.radio_state || 'IDLE';
      const link = snapshot.link || {};
      const snr = link.snr_db == null ? '--' : `${Number(link.snr_db).toFixed(1)} dB`;
      const rssi = link.rssi_dbm == null ? '--' : `${Math.round(link.rssi_dbm)} dBm`;
      const loss = link.packet_loss_percent == null ? '--' : `${Math.round(link.packet_loss_percent)}%`;
      const crc = link.crc_pass == null ? '--' : link.crc_pass ? 'PASS' : 'FAIL';
      const sync = link.sync_score == null ? '--' : `${Number(link.sync_score).toFixed(1)}/16`;
      const rtt = link.round_trip_secs == null ? '--' : `${Number(link.round_trip_secs).toFixed(1)}s`;

      els.state.textContent = state;
      els.state.className = `state ${state.toLowerCase()}`;
      els.freq.textContent = `${Number(snapshot.frequency_mhz || 0).toFixed(3)} MHz`;
      currentMode = snapshot.mode || 'Manual';
      els.modeToggle.textContent = currentMode;
      els.modeToggle.setAttribute('aria-pressed', String(currentMode.toLowerCase() === 'claude'));
      els.audio.textContent = `${Math.round(snapshot.audio_level || 0)}%`;
      els.updated.textContent = new Date(Number(snapshot.updated_at_ms)).toLocaleTimeString();
      els.imageStatus.textContent = snapshot.image_status ? `image ${snapshot.image_status}` : '';
      els.sos.textContent = snapshot.active_sos
        ? `SOS ${snapshot.active_sos.id} ${snapshot.active_sos.acknowledged ? 'ACKED' : 'ACTIVE'}`
        : '';

      els.topSnr.textContent = snr;
      els.topRssi.textContent = rssi;
      els.topLoss.textContent = loss;
      els.topCrc.textContent = crc;
      els.topSync.textContent = sync;
      els.topRtt.textContent = rtt;
      els.snr.textContent = snr;
      els.rssi.textContent = rssi;
      els.loss.textContent = loss;
      els.crc.textContent = crc;
      els.sync.textContent = sync;
      els.rtt.textContent = rtt;
      els.fec.textContent = link.fec_corrections == null ? '--' : String(link.fec_corrections);
      els.fieldCoords.textContent = formatCoords(snapshot.field_location);
      els.baseCoords.textContent = formatCoords(snapshot.base_location);

      renderLog(snapshot.messages || []);
      drawSpectrum(els.fft, snapshot.current_fft || []);
      setLatestWaterfallRow(
        snapshot.waterfall_history || [],
        snapshot.current_fft || [],
        state,
        Number(snapshot.audio_level || 0)
      );
      updateMap(snapshot.base_location, snapshot.field_location);
    }

    function renderLog(messages) {
      const key = `${messages.length}:${messages.length ? messages[messages.length - 1].text : ''}`;
      if (key === lastLogKey) return;
      lastLogKey = key;
      els.log.replaceChildren();
      for (const message of messages) {
        const div = document.createElement('div');
        div.className = `msg ${message.kind || 'system'}`;
        div.textContent = message.text;
        els.log.appendChild(div);
      }
      els.log.scrollTop = els.log.scrollHeight;
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * scale));
      const height = Math.max(1, Math.floor(rect.height * scale));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      const ctx = canvas.getContext('2d');
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      return { ctx, width: rect.width, height: rect.height };
    }

    function drawSpectrum(canvas, fft) {
      const { ctx, width, height } = resizeCanvas(canvas);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, width, height);
      drawAxis(ctx, width, height);
      if (!fft.length) return;

      const axisH = 24;
      const graphH = Math.max(1, height - axisH);
      ctx.strokeStyle = '#f7f7f7';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      for (let i = 0; i < fft.length; i++) {
        const x = fft.length === 1 ? 0 : (i / (fft.length - 1)) * width;
        const y = graphH - clamp(Number(fft[i]) || 0, 0, 1) * (graphH - 10) - 5;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      ctx.fillStyle = '#f7f7f7';
      const barW = Math.max(1, width / fft.length);
      for (let i = 0; i < fft.length; i++) {
        const value = clamp(Number(fft[i]) || 0, 0, 1);
        const barH = value * graphH;
        ctx.globalAlpha = 0.28;
        ctx.fillRect(i * barW, graphH - barH, Math.ceil(barW), barH);
      }
      ctx.globalAlpha = 1;
    }

    function setLatestWaterfallRow(history, currentFft, radioState, audioLevel) {
      const newest = history.length ? history[0] : currentFft;
      if (!newest || !newest.length) return;
      const signalActive = radioState === 'TX' || radioState === 'RX' || audioLevel > 1;
      latestWaterfallRow = signalActive ? newest.slice() : new Array(newest.length).fill(0);
      if (latestWaterfallRow.length !== waterfallRowLength) {
        waterfallRowLength = latestWaterfallRow.length;
        waterfallRows = makeBlackRows(waterfallCapacity(els.waterfall), waterfallRowLength);
      }
    }

    function tickWaterfall() {
      const capacity = waterfallCapacity(els.waterfall);
      if (!waterfallRowLength && latestWaterfallRow.length) {
        waterfallRowLength = latestWaterfallRow.length;
      }
      if (waterfallRowLength && waterfallRows.length !== capacity) {
        const existing = waterfallRows.slice(0, capacity);
        const black = makeBlackRows(Math.max(0, capacity - existing.length), waterfallRowLength);
        waterfallRows = existing.concat(black);
      }
      if (waterfallRowLength) {
        const row = latestWaterfallRow.length
          ? latestWaterfallRow.slice()
          : new Array(waterfallRowLength).fill(0);
        for (let i = 0; i < WATERFALL_ROWS_PER_TICK; i++) {
          waterfallRows.unshift(row.slice());
        }
        waterfallRows = waterfallRows.slice(0, capacity);
      }
      drawWaterfall(els.waterfall, waterfallRows);
    }

    function waterfallCapacity(canvas) {
      const rect = canvas.getBoundingClientRect();
      const graphH = Math.max(1, rect.height - 24);
      return Math.max(1, Math.floor(graphH / WATERFALL_ROW_PX));
    }

    function makeBlackRows(count, length) {
      return Array.from({ length: count }, () => new Array(length).fill(0));
    }

    function drawWaterfall(canvas, rows) {
      const { ctx, width, height } = resizeCanvas(canvas);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, width, height);
      const axisH = 24;
      const graphH = Math.max(1, height - axisH);
      const visibleRows = Math.max(1, Math.floor(graphH / WATERFALL_ROW_PX));
      const rowH = graphH / visibleRows;

      for (let i = 0; i < visibleRows; i++) {
        const row = rows[i] || (waterfallRowLength ? new Array(waterfallRowLength).fill(0) : []);
        const y = i * rowH;
        for (let x = 0; x < width; x++) {
          ctx.fillStyle = gray(interpolateRow(row, x / Math.max(1, width - 1)));
          ctx.fillRect(x, y, 1, Math.ceil(rowH));
        }
      }
      drawAxis(ctx, width, height);
    }

    function interpolateRow(row, ratio) {
      if (!row.length) return 0;
      if (row.length === 1) return row[0] || 0;
      const index = clamp(ratio, 0, 1) * (row.length - 1);
      const left = Math.floor(index);
      const right = Math.min(row.length - 1, left + 1);
      const mix = index - left;
      return (row[left] || 0) * (1 - mix) + (row[right] || 0) * mix;
    }

    function drawAxis(ctx, width, height) {
      const axisH = 24;
      const y = height - axisH;
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, y, width, axisH);
      ctx.strokeStyle = '#3a3a3a';
      ctx.beginPath();
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(width, y + 0.5);
      ctx.stroke();
      ctx.fillStyle = '#9a9a9a';
      ctx.font = '12px ui-monospace, monospace';
      ctx.fillText('0', 8, y + 16);
      ctx.fillText('2.5 kHz', width / 2 - 26, y + 16);
      ctx.fillText('5 kHz', width - 50, y + 16);
    }

    function gray(value) {
      const v = clamp(Number(value) || 0, 0, 1);
      if (v <= 0) return '#000';
      const level = Math.round(12 + v * 230);
      return `rgb(${level}, ${level}, ${level})`;
    }

    function initMap() {
      if (!window.L || map) return Boolean(map);
      map = L.map('map', {
        zoomControl: true,
        attributionControl: true
      }).setView([-33.8688, 151.2093], 11);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);
      return true;
    }

    function updateMap(base, field) {
      if (!initMap()) {
        els.mapNotice.textContent = 'map library unavailable';
        return;
      }
      const key = JSON.stringify({ base, field });
      if (key === lastMapKey) return;
      lastMapKey = key;

      const points = [];
      if (base) {
        const latLng = [base.lat, base.lon];
        points.push(latLng);
        baseMarker = upsertMarker(baseMarker, latLng, 'B', 'Base');
      } else if (baseMarker) {
        map.removeLayer(baseMarker);
        baseMarker = null;
      }

      if (field) {
        const latLng = [field.lat, field.lon];
        points.push(latLng);
        fieldMarker = upsertMarker(fieldMarker, latLng, 'F', 'Field');
        if (field.accuracy_m != null) {
          if (!fieldAccuracy) {
            fieldAccuracy = L.circle(latLng, {
              radius: field.accuracy_m,
              color: '#f7f7f7',
              weight: 1,
              fillColor: '#f7f7f7',
              fillOpacity: 0.08
            }).addTo(map);
          } else {
            fieldAccuracy.setLatLng(latLng);
            fieldAccuracy.setRadius(field.accuracy_m);
          }
        } else if (fieldAccuracy) {
          map.removeLayer(fieldAccuracy);
          fieldAccuracy = null;
        }
      } else {
        if (fieldMarker) map.removeLayer(fieldMarker);
        if (fieldAccuracy) map.removeLayer(fieldAccuracy);
        fieldMarker = null;
        fieldAccuracy = null;
      }

      if (base && field) {
        const latLngs = [[base.lat, base.lon], [field.lat, field.lon]];
        if (!linkLine) {
          linkLine = L.polyline(latLngs, { color: '#f7f7f7', weight: 2, dashArray: '6 5' }).addTo(map);
        } else {
          linkLine.setLatLngs(latLngs);
        }
        const distance = haversine(base, field);
        const bearing = bearingDeg(base, field);
        els.mapLabel.textContent = `${(distance / 1000).toFixed(2)} km ${Math.round(bearing).toString().padStart(3, '0')} deg`;
      } else {
        if (linkLine) map.removeLayer(linkLine);
        linkLine = null;
        els.mapLabel.textContent = field ? 'base GPS unset' : base ? 'waiting for field GPS' : 'waiting for GPS';
      }

      if (points.length === 2) {
        map.fitBounds(points, { padding: [36, 36], maxZoom: 15 });
      } else if (points.length === 1) {
        map.setView(points[0], Math.max(map.getZoom(), 13));
      }
      setTimeout(() => map.invalidateSize(), 0);
    }

    function upsertMarker(marker, latLng, label, title) {
      const icon = L.divIcon({
        className: '',
        html: `<div class="map-marker" title="${title}">${label}</div>`,
        iconSize: [26, 26],
        iconAnchor: [13, 13]
      });
      if (!marker) return L.marker(latLng, { icon }).addTo(map).bindTooltip(title);
      marker.setLatLng(latLng);
      marker.setIcon(icon);
      return marker;
    }

    function setBaseFromBrowserGps() {
      if (!navigator.geolocation) {
        els.mapNotice.textContent = 'browser GPS unavailable';
        return;
      }
      els.baseGps.disabled = true;
      els.mapNotice.textContent = 'requesting browser GPS';
      navigator.geolocation.getCurrentPosition(async (pos) => {
        els.baseGps.disabled = false;
        els.mapNotice.textContent = '';
        await postJson('/base-location', {
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          accuracy_m: pos.coords.accuracy
        });
      }, () => {
        els.baseGps.disabled = false;
        els.mapNotice.textContent = 'could not get browser GPS';
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
    }

    function formatCoords(location) {
      if (!location) return '--';
      return `${Number(location.lat).toFixed(5)}, ${Number(location.lon).toFixed(5)}`;
    }

    function haversine(a, b) {
      const r = 6371000;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLon = (b.lon - a.lon) * Math.PI / 180;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return r * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }

    function bearingDeg(a, b) {
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const dLon = (b.lon - a.lon) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    window.addEventListener('resize', () => {
      if (waterfallRowLength) {
        waterfallRows = waterfallRows.slice(0, waterfallCapacity(els.waterfall));
      }
      drawWaterfall(els.waterfall, waterfallRows);
      if (map) setTimeout(() => map.invalidateSize(), 0);
      fetch('/status', { cache: 'no-store' }).then(r => r.json()).then(scheduleRender).catch(() => {});
    });

    setInterval(tickWaterfall, WATERFALL_INTERVAL_MS);
    poll();
  </script>
</body>
</html>
